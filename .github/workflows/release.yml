name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create plugin ZIP
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p /tmp/release/carspace-dashboard
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='CLAUDE.md' \
            ./ /tmp/release/carspace-dashboard/
          cd /tmp/release
          zip -r "carspace-dashboard-v${VERSION}.zip" carspace-dashboard/
          ls -lh "carspace-dashboard-v${VERSION}.zip"

      - name: Create release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          generate_release_notes: true
          make_latest: true
          files: /tmp/release/carspace-dashboard-v${{ steps.version.outputs.VERSION }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
